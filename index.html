<!DOCTYPE html> 
<html lang="ar" dir="rtl"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Gikatib</title> 
    <style> 
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; } 
        .container { background-color: #1e293b; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); text-align: center; max-width: 500px; width: 100%; } 
        h1 { font-size: 2.2rem; margin-bottom: 5px; color: #38bdf8; font-weight: bold; } 
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 25px; } 
        .custom-file-upload { border: 2px dashed #38bdf8; display: block; padding: 30px 20px; cursor: pointer; border-radius: 12px; transition: all 0.3s; background-color: #1e293b; margin-bottom: 20px; } 
        .custom-file-upload:hover { background-color: #0c4a6e; border-color: #7dd3fc; } 
        input[type="file"] { display: none; } 
        .info-box { background: #334155; padding: 10px; border-radius: 8px; margin-bottom: 20px; display: none; text-align: right; } 
        .info-box span { color: #34d399; font-weight: bold; } 
        label { display: block; margin-bottom: 8px; color: #cbd5e1; text-align: right; } 
        select { width: 100%; padding: 12px; border-radius: 8px; background-color: #0f172a; color: white; border: 1px solid #475569; font-size: 1rem; margin-bottom: 15px; outline: none; } 
        .repair-container { display: flex; align-items: center; background: #0f172a; padding: 12px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #334155; cursor: pointer; } 
        .repair-container input { width: 20px; height: 20px; margin-left: 10px; cursor: pointer; } 
        .repair-container label { margin: 0; cursor: pointer; font-size: 0.9rem; color: #e2e8f0; } 
        button { background-color: #38bdf8; color: #0f172a; border: none; padding: 14px 24px; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; display: none; transition: background 0.2s; } 
        button:hover { background-color: #7dd3fc; } 
        button:disabled { background-color: #475569; color: #94a3b8; cursor: not-allowed; } 
        #status { margin-top: 20px; font-size: 0.95rem; color: #fbbf24; font-weight: bold; min-height: 1.5em; } 
        .progress-bar-wrap { display: none; background: #0f172a; border-radius: 8px; height: 8px; margin-top: 14px; overflow: hidden; } 
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #38bdf8, #7dd3fc); border-radius: 8px; transition: width 0.4s ease; } 
    </style> 
</head> 
<body> 
<div class="container"> 
    <h1>Gikatib</h1> 
    <p>Gikatib هو تطبيق ويب لتحويل صيغ ملفات 3D مجاناً بالكامل</p> 
    <label for="file-upload" class="custom-file-upload" id="upload-label">اضغط هنا لاختيار ملف الـ 3D المطلوب</label> 
    <input id="file-upload" type="file" accept=".obj,.stl,.gltf,.glb,.ply,.fbx" /> 
    <div id="info-box" class="info-box"> 
        صيغة الملف: <span id="detected-format"></span><br> 
        اسم الملف: <span id="file-name-display"></span><br> 
        حجم الملف: <span id="file-size-display"></span> 
    </div> 
    <div id="options-area" style="display: none;"> 
        <label for="output-format">اختر الصيغة التي تريد التحويل إليها:</label> 
        <select id="output-format"></select> 
        <div class="repair-container"> 
            <input type="checkbox" id="repair-toggle" checked /> 
            <label for="repair-toggle">تفعيل المعالجة وإصلاح الأخطاء الهندسية (قد يستغرق وقتاً أطول للملفات الضخمة)</label> 
        </div> 
        <button id="convert-btn">اضغط هنا للبدء</button> 
    </div> 
    <div class="progress-bar-wrap" id="progress-wrap"> 
        <div class="progress-bar" id="progress-bar"></div> 
    </div> 
    <div id="status"></div> 
</div> 
<script> 
    const SERVER_URL = "https://m1w2n-migatyp.hf.space/convert"; 
    const ALLOWED_EXTS = ['obj', 'stl', 'gltf', 'glb', 'ply', 'fbx']; 
    const MAX_FILE_SIZE_MB = 200; 
    const fileUpload = document.getElementById('file-upload'); 
    const uploadLabel = document.getElementById('upload-label'); 
    const convertBtn = document.getElementById('convert-btn'); 
    const statusEl = document.getElementById('status'); 
    const detectedFmt = document.getElementById('detected-format'); 
    const fileNameDisp = document.getElementById('file-name-display'); 
    const fileSizeDisp = document.getElementById('file-size-display'); 
    const infoBox = document.getElementById('info-box'); 
    const optionsArea = document.getElementById('options-area'); 
    const outputFormat = document.getElementById('output-format'); 
    const repairToggle = document.getElementById('repair-toggle'); 
    const progressWrap = document.getElementById('progress-wrap'); 
    const progressBar = document.getElementById('progress-bar'); 
    let originalFileName = ""; 
    let currentExt = ""; 

    function setStatus(msg, color = "#fbbf24") { 
        statusEl.textContent = msg; 
        statusEl.style.color = color; 
    } 

    function formatSize(bytes) { 
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB"; 
        return (bytes / (1024 * 1024)).toFixed(1) + " MB"; 
    } 

    function buildFormatOptions(currentExt) { 
        outputFormat.innerHTML = ""; 
        ALLOWED_EXTS.filter(ext => ext !== 'fbx').forEach(ext => { 
            if (ext === currentExt) return; 
            const opt = document.createElement('option'); 
            opt.value = ext; 
            opt.textContent = ext.toUpperCase(); 
            outputFormat.appendChild(opt); 
        }); 
    } 

    function setProgress(pct) { 
        progressBar.style.width = pct + "%"; 
    } 

    fileUpload.addEventListener('change', function (e) { 
        const file = e.target.files[0]; 
        if (!file) return; 
        const ext = file.name.split('.').pop().toLowerCase(); 
        if (!ALLOWED_EXTS.includes(ext)) { 
            setStatus("❌ خطأ: الرجاء اختيار ملف مجسم 3D مدعوم.", "#ef4444"); 
            infoBox.style.display = "none"; optionsArea.style.display = "none"; convertBtn.style.display = "none"; 
            fileUpload.value = ""; return; 
        } 
        if (file.size > MAX_FILE_SIZE_MB * 1024 * 1024) { 
            setStatus(`❌ خطأ: حجم الملف يتجاوز الحد المسموح (${MAX_FILE_SIZE_MB} MB).`, "#ef4444"); 
            infoBox.style.display = "none"; optionsArea.style.display = "none"; convertBtn.style.display = "none"; 
            fileUpload.value = ""; return; 
        } 
        currentExt = ext; 
        originalFileName = file.name.split('.').slice(0, -1).join('.'); 
        detectedFmt.textContent = ext.toUpperCase(); 
        fileNameDisp.textContent = originalFileName; 
        fileSizeDisp.textContent = formatSize(file.size); 
        uploadLabel.textContent = `الملف المختار: ${file.name}`; 
        buildFormatOptions(currentExt); 
        infoBox.style.display = "block"; optionsArea.style.display = "block"; convertBtn.style.display = "block"; 
        progressWrap.style.display = "none"; 
        setProgress(0); 
        setStatus("المجسم جاهز للتحويل!"); 
    }); 

    convertBtn.addEventListener('click', async function () { 
        const file = fileUpload.files[0]; 
        if (!file) return; 
        const targetFormat = outputFormat.value; 
        convertBtn.disabled = true; 
        progressWrap.style.display = "block"; 
        setProgress(10); 
        setStatus("جاري رفع الملف ومعالجته في السحاب... يرجى الانتظار."); 
        const formData = new FormData(); 
        formData.append("file", file); 
        formData.append("output_format", targetFormat); 
        formData.append("repair", repairToggle.checked ? "true" : "false"); 
        try { 
            let fakeProgress = 10; 
            const progressInterval = setInterval(() => { 
                if (fakeProgress < 85) { 
                    fakeProgress += Math.random() * 5; 
                    setProgress(Math.min(fakeProgress, 85)); 
                } 
            }, 600); 
            const response = await fetch(SERVER_URL, { method: "POST", body: formData }); 
            clearInterval(progressInterval); 
            if (!response.ok) { 
                const errText = await response.text().catch(() => ""); 
                throw new Error(errText || `HTTP ${response.status}`); 
            } 
            setProgress(95); 
            const blob = await response.blob(); 
            if (blob.size === 0) throw new Error("الملف المُستلم فارغ."); 
            const downloadLink = document.createElement('a'); 
            downloadLink.href = URL.createObjectURL(blob); 
            downloadLink.download = `${originalFileName}.${targetFormat}`; 
            document.body.appendChild(downloadLink); 
            downloadLink.click(); 
            document.body.removeChild(downloadLink); 
            setTimeout(() => URL.revokeObjectURL(downloadLink.href), 5000); 
            setProgress(100); 
            setStatus("تم التحويل بنجاح واكتمال العملية! 🎉", "#34d399"); 
        } catch (err) { 
            setProgress(0); 
            progressWrap.style.display = "none"; 
            const msg = err.message && err.message !== "Failed to fetch" ? `❌ خطأ: ${err.message}` : "❌ عذراً، حدثت مشكلة في الاتصال بالسيرفر أو أثناء المعالجة."; 
            setStatus(msg, "#ef4444"); 
        } finally { 
            convertBtn.disabled = false; 
        } 
    }); 
</script> 
</body> 
</html>
